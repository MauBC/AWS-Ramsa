service: marcela-aws-backend

provider:
  name: aws
  runtime: nodejs22.x
  region: us-east-1
  stage: dev

  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:5173
        - http://127.0.0.1:5173
        - http://localhost:3000
        - http://127.0.0.1:3000
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: false
      
  environment:
    AUTOMATION_TABLE: automation-${sls:stage}
    STAGE: ${sls:stage}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:BatchWriteItem
          Resource:
            - arn:aws:dynamodb:us-east-1:*:table/automation-${sls:stage}

functions:
  hello:
    handler: app/handlers/hello.handler
    events:
      - httpApi:
          path: /hello
          method: get

  health:
    handler: app/handlers/health.handler
    events:
      - httpApi:
          path: /health
          method: get

  searchUsers:
    handler: app/handlers/users.search
    events:
      - httpApi:
          path: /users/search
          method: get

  createRequest:
    handler: app/handlers/requests.create
    events:
      - httpApi:
          path: /requests
          method: post

  listRequests:
    handler: app/handlers/requests.listAll
    events:
      - httpApi:
          path: /requests
          method: get

  listProjects:
    handler: app/handlers/projects.listProjects
    events:
      - httpApi:
          path: /projects
          method: get

  createProject:
    handler: app/handlers/projects.createProject
    events:
      - httpApi:
          path: /projects
          method: post

  createMasterCategory:
    handler: app/handlers/masters.createCategory
    events:
      - httpApi:
          path: /masters/categories
          method: post

  listMasterCategories:
    handler: app/handlers/masters.listCategories
    events:
      - httpApi:
          path: /masters/categories
          method: get

  deleteMasterCategory:
    handler: app/handlers/masters.deleteCategory
    events:
      - httpApi:
          path: /masters/categories/{categoryId}
          method: delete

  createMasterItem:
    handler: app/handlers/masters.createItem
    events:
      - httpApi:
          path: /masters/categories/{categoryId}/items
          method: post

  listMasterItems:
    handler: app/handlers/masters.listItemsByCategory
    events:
      - httpApi:
          path: /masters/categories/{categoryId}/items
          method: get

  deleteMasterItem:
    handler: app/handlers/masters.deleteItem
    events:
      - httpApi:
          path: /masters/categories/{categoryId}/items/{itemId}
          method: delete

  listPkTypes:
    handler: app/handlers/masters.listPkTypes
    events:
      - httpApi:
          path: /masters/pk-types
          method: get

  listItemsByPk:
    handler: app/handlers/masters.listItemsByPk
    events:
      - httpApi:
          path: /masters/pk-items
          method: get

  listCountries:
    handler: app/handlers/countries.listAll
    events:
      - httpApi:
          path: /countries
          method: get

  createCountry:
    handler: app/handlers/countries.create
    events:
      - httpApi:
          path: /countries
          method: post

  deleteCountry:
    handler: app/handlers/countries.remove
    events:
      - httpApi:
          path: /countries/{paisId}
          method: delete

  listCountryLabels:
    handler: app/handlers/countries.listLabels
    events:
      - httpApi:
          path: /countries/{paisId}/labels
          method: get

  createCountryLabel:
    handler: app/handlers/countries.createLabel
    events:
      - httpApi:
          path: /countries/{paisId}/labels
          method: post

  deleteCountryLabel:
    handler: app/handlers/countries.removeLabel
    events:
      - httpApi:
          path: /countries/{paisId}/labels/{labelId}
          method: delete

  listCountryBusinesses:
    handler: app/handlers/countries.listBusinesses
    events:
      - httpApi:
          path: /countries/{paisId}/labels/{labelId}/businesses
          method: get

  createCountryBusiness:
    handler: app/handlers/countries.createBusiness
    events:
      - httpApi:
          path: /countries/{paisId}/labels/{labelId}/businesses
          method: post

  deleteCountryBusiness:
    handler: app/handlers/countries.removeBusiness
    events:
      - httpApi:
          path: /countries/{paisId}/labels/{labelId}/businesses/{negocioId}
          method: delete

  listBenefits:
    handler: app/handlers/benefits.listAll
    events:
      - httpApi:
          path: /benefits
          method: get

  createBenefit:
    handler: app/handlers/benefits.create
    events:
      - httpApi:
          path: /benefits
          method: post

  deleteBenefit:
    handler: app/handlers/benefits.remove
    events:
      - httpApi:
          path: /benefits/{beneficioId}
          method: delete

  listCatalog:
    handler: app/handlers/catalog.listAll
    events:
      - httpApi:
          path: /catalog
          method: get

  createCatalog:
    handler: app/handlers/catalog.create
    events:
      - httpApi:
          path: /catalog
          method: post

  deleteCatalog:
    handler: app/handlers/catalog.remove
    events:
      - httpApi:
          path: /catalog/{catalogoId}
          method: delete

resources:
  Resources:
    AutomationTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: automation-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE